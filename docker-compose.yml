version: "3.9"

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://retail:retail@mongo:27017/projectdashboard?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongo

  mongo:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE=projectdashboard
      MONGO_INITDB_ROOT_USERNAME=retail
      MONGO_INITDB_ROOT_PASSWORD=retail
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
